# Nightfall Configuration
# Paper 1.21.1 | nightfall.admin for commands

# ── Night Window ────────────────────────────────────────────────────────────
night:
  # World time ticks for night start/end. Vanilla night = 13000-23000.
  start-tick: 13000
  end-tick: 23000
  # List of world names to enable Nightfall in. Empty = all worlds.
  enabled-worlds: []

# ── Siege / Damage Multipliers ───────────────────────────────────────────────
siege:
  # Multiply outgoing mob melee damage at night (1.0 = no change).
  mob-damage-multiplier: 1.4
  # Reduce incoming player damage from mobs at night (1.0 = no reduction).
  # Set to 1.0 to disable. Values < 1.0 make players tankier (not recommended
  # for hard mode -- set above 1.0 to increase incoming damage instead).
  player-incoming-multiplier: 1.0
  # Broadcast a title to all players when night begins/ends.
  announce-night: true
  announce-day: true

# ── Heat System ─────────────────────────────────────────────────────────────
heat:
  # How long (seconds) before a heat node fully decays.
  decay-seconds: 90
  # Heat nodes within this radius (blocks) are merged into the strongest one.
  merge-radius: 3
  # Heat generated per event type (arbitrary units, relative to each other).
  sources:
    block-break: 20
    block-place: 10
    sprint-start: 5
    interact: 8
    shoot-bow: 15
    player-hurt: 30
  # Radius (blocks) a mob scans for a heat node to pathfind toward.
  mob-scan-radius: 32
  # How long (seconds) a mob remembers a last-seen player location.
  last-seen-memory-seconds: 20

# ── Light Attraction ────────────────────────────────────────────────────────
light-attraction:
  enabled: true
  # Mob scans this radius for light blocks when it has no heat/last-seen target.
  scan-radius: 20
  # Block types that attract mobs. Must be valid Material names.
  light-blocks:
    - TORCH
    - WALL_TORCH
    - SOUL_TORCH
    - SOUL_WALL_TORCH
    - LANTERN
    - SOUL_LANTERN
    - GLOWSTONE
    - SEA_LANTERN
    - SHROOMLIGHT
    - LIGHT
    - CAMPFIRE
# ── Breach (Block Breaking) ──────────────────────────────────────────────────
breach:
  enabled: true
  # Radius around the mob's target within which a player must be to trigger breach.
  trigger-radius: 24
  # Mob must be stuck for this many ticks before attempting a break.
  stuck-ticks: 40
  # After failing to path for this many ticks, also attempt breach.
  path-fail-ticks: 60
  # Search this many blocks around the raytrace hit for "easier" entry blocks.
  preference-radius: 2
  # Block types considered easy entry (searched first in preference mode).
  preference-blocks:
