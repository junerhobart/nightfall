  protect-containers: true

  # required-tool: none | axe | pickaxe
  # Mobs must hold the matching tool to breach that tier.
  # Break ticks = block hardness * hardness-multiplier, clamped to [min-break-ticks, max-break-ticks].
  # Vanilla reference: torch=0.0, glass/lantern=0.3, sand/dirt=0.5, wool=0.8,
  #   stone/cobble=1.5-2.0, wood logs/planks/doors=2.0-3.0, deepslate=3.5.
  hardness-multiplier: 30.0
  min-break-ticks: 1
  max-break-ticks: 300

  # Tiers define hardness bands and tool requirements.
  # A block goes into the lowest-numbered tier whose max-hardness >= block's hardness.
  # Blocks harder than ALL tiers are not breachable (even without protected-blocks).
  # Blocks with hardness < 0 (bedrock, barrier) are never breachable.
  tiers:
    0:
      enabled: true
      max-hardness: 0.0    # Instant: torches, candles, buttons, pressure plates (hardness 0)
      required-tool: none
    1:
      enabled: true
      max-hardness: 1.5    # Soft: glass (0.3), sand/dirt (0.5), wool (0.8), snow/ice (0.5), leaves (0.2)
      required-tool: none
    2:
      enabled: true
      max-hardness: 3.0    # Medium: wood logs/planks/doors/fences (2.0–3.0)
      required-tool: none
    3:
      enabled: true
      max-hardness: 7.0    # Hard: stone/cobble/brick/deepslate (1.5–3.5) -- requires pickaxe
      required-tool: pickaxe

  # Max distance (blocks) from the mob to the candidate block. Prevents breaking blocks across the room.
  max-reach-distance: 2.5

  # Proactive torch/light hunting. Mobs will break these blocks on sight even when not stuck.
  torch-hunt-radius: 5
  torch-hunt-blocks:
    - TORCH
    - WALL_TORCH
    - SOUL_TORCH
    - SOUL_WALL_TORCH
    - LANTERN
    - SOUL_LANTERN
    - SEA_LANTERN
    - GLOWSTONE
    - SHROOMLIGHT
    - JACK_O_LANTERN

  max-breaks-per-night: 8
  max-breaks-per-chase: 3
  max-chunk-breaks-per-night: 20
  max-breakers-per-player: 3
  max-break-ticks-per-tick: 10
  max-new-breaches-per-second: 6
  failed-block-cooldown-seconds: 15

  # Mob roles: controls which mobs do what during a siege.
  # breakers: actively break blocks to path through.
  # followers: skip block-breaking, instead flock toward active breaches.
  # exploders: navigate to breach candidate and ignite to blast the wall open.
  # Leave a list empty to disable that role entirely.
  mob-roles:
    breakers:
      - ZOMBIE
      - HUSK
      - DROWNED
      - ZOMBIE_VILLAGER
      - WITHER_SKELETON
      - GIANT
      - VINDICATOR
      - PILLAGER
      - RAVAGER
      - PIGLIN_BRUTE
    followers:
      - SKELETON
      - STRAY
      - BOGGED
    exploders:
      - CREEPER

  # How close a follower mob will travel to join an active breach.
  follower-radius: 32.0
  # How close a creeper must get to the target block before igniting.
  exploder-trigger-radius: 3.0

debug: false
